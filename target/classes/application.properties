# =============================================
# Configuración de la aplicación API Productos
# =============================================

# Puerto del servidor (por defecto 8080)
server.port=8080

# Nombre de la aplicación
spring.application.name=apiproductos

# Formato de fecha y zona horaria en respuestas JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota

# Mostrar mensajes de error detallados (solo para desarrollo)
server.error.include-message=always
server.error.include-binding-errors=always
